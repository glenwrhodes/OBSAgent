<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBSAgent</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --border: #2d3561;
    --text: #e0e0e0;
    --muted: #8892a4;
    --accent: #7e57c2;
    --accent-hover: #9c6fe3;
    --user-bg: #1e3a5f;
    --agent-bg: #1e2a3a;
    --success: #4caf50;
    --error: #f44336;
    --tool-bg: #0d1f30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--success); }
  .status-dot.error { background: var(--error); }
  .status-text { font-size: 0.7rem; color: var(--muted); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    max-width: 92%;
    padding: 0.55rem 0.75rem;
    border-radius: 10px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .message.user {
    background: var(--user-bg);
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .message.agent {
    background: var(--agent-bg);
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    border-left: 2px solid var(--accent);
  }
  .message.system {
    background: transparent;
    align-self: center;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    border: 1px solid var(--border);
    padding: 0.3rem 0.6rem;
    border-radius: 20px;
  }

  /* Tool calls display */
  .tool-calls {
    margin-top: 0.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .tool-call {
    background: var(--tool-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-size: 0.72rem;
    font-family: 'Consolas', 'Monaco', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .tool-call.success { border-left: 2px solid var(--success); }
  .tool-call.error { border-left: 2px solid var(--error); }
  .tool-name { color: #79c7e3; font-weight: 600; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 0.3rem;
    padding: 0.55rem 0.75rem;
    background: var(--agent-bg);
    border-radius: 10px;
    border-bottom-left-radius: 3px;
    border-left: 2px solid var(--accent);
    align-self: flex-start;
    align-items: center;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 0.6rem;
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 0.4rem;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button.send-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    font-size: 1rem;
  }
  button.send-btn:hover { background: var(--accent-hover); }
  button.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Quick actions */
  .quick-actions {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
    margin-bottom: 0.4rem;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(126,87,194,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <span>🤖</span> OBSAgent
  </div>
  <div style="display:flex;align-items:center;gap:0.4rem">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Connecting...</span>
  </div>
</div>

<div class="messages" id="messages">
  <div class="message system">OBSAgent ready — describe what you want to do</div>
</div>

<div class="input-area">
  <div class="quick-actions">
    <button class="quick-btn" onclick="quickSend('What scenes do I have?')">📋 List scenes</button>
    <button class="quick-btn" onclick="quickSend('What sources are in my current scene?')">🔍 List sources</button>
    <button class="quick-btn" onclick="quickSend('Show me OBS stats')">📊 Stats</button>
    <button class="quick-btn" onclick="quickSend('Mute my microphone')">🔇 Mute mic</button>
    <button class="quick-btn" onclick="quickSend('Start recording')">⏺️ Record</button>
  </div>
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Describe what you want..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let history = [];
let busy = false;

// Check OBS connection on load
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    if (data.connected) {
      statusDot.className = 'status-dot connected';
      statusText.textContent = `OBS ${data.obs_version || 'connected'}`;
    } else {
      statusDot.className = 'status-dot error';
      statusText.textContent = 'OBS not connected';
    }
  } catch(e) {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Server offline';
  }
}

checkStatus();
setInterval(checkStatus, 10000);

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function quickSend(text) {
  inputEl.value = text;
  sendMessage();
}

function addMessage(role, text, toolCalls) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;

  if (toolCalls && toolCalls.length > 0) {
    const tcDiv = document.createElement('div');
    tcDiv.className = 'tool-calls';
    toolCalls.forEach(tc => {
      const tcEl = document.createElement('div');
      tcEl.className = `tool-call ${tc.success ? 'success' : 'error'}`;
      const icon = tc.success ? '✓' : '✗';
      tcEl.innerHTML = `<span>${icon}</span><span class="tool-name">${tc.tool}</span>`;
      tcDiv.appendChild(tcEl);
    });
    div.appendChild(tcDiv);
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  div.id = 'typing-indicator';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (busy) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  busy = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  addTyping();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text, history })
    });
    const data = await r.json();
    removeTyping();

    if (data.success) {
      addMessage('agent', data.response, data.tool_calls);
      history.push({role: 'user', content: text});
      history.push({role: 'assistant', content: data.response});
      // Keep history manageable
      if (history.length > 20) history = history.slice(-20);
    } else {
      addMessage('system', `Error: ${data.error}`);
    }
  } catch(e) {
    removeTyping();
    addMessage('system', 'Connection error — is the agent server running?');
  } finally {
    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
